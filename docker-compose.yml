services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: video-generator-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-video123}
      MYSQL_DATABASE: ${DB_DATABASE:-video_generator}
      TZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - video-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-generator-backend
    restart: unless-stopped
    environment:
      # Database
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-video123}
      DB_DATABASE: ${DB_DATABASE:-video_generator}
      # DashScope
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_TEXT_MODEL: ${DASHSCOPE_TEXT_MODEL:-qwen-max}
      DASHSCOPE_IMAGE_MODEL: ${DASHSCOPE_IMAGE_MODEL:-wan2.6-t2i}
      DASHSCOPE_TEMPERATURE: ${DASHSCOPE_TEMPERATURE:-0.7}
      DASHSCOPE_MAX_TOKENS: ${DASHSCOPE_MAX_TOKENS:-4096}
      DASHSCOPE_TIMEOUT_SECONDS: ${DASHSCOPE_TIMEOUT_SECONDS:-120}
      # Ark (Seedream)
      ARK_API_KEY: ${ARK_API_KEY}
      ARK_BASE_URL: ${ARK_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      ARK_MODEL: ${ARK_MODEL:-doubao-seedream-4-5-251128}
      # IndexTTS
      INDEXTTS_API_KEY: ${INDEXTTS_API_KEY}
      INDEXTTS_BASE_URL: ${INDEXTTS_BASE_URL:-https://api.modelverse.cn}
      INDEXTTS_MODEL: ${INDEXTTS_MODEL:-IndexTeam/IndexTTS-2}
      INDEXTTS_VOICE: ${INDEXTTS_VOICE:-jack_cheng}
      # COS
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_BUCKET: ${COS_BUCKET}
      COS_REGION: ${COS_REGION:-ap-guangzhou}
      # SCF (Cloud Function)
      SCF_ZIP_URL: ${SCF_ZIP_URL}
      # Admin
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-video123}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      # App
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ./projects:/app/projects
      - ./character_library:/app/character_library
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - video-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: video-generator-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - video-network

  # Database initialization (runs once)
  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-generator-db-init
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-video123}
      DB_DATABASE: ${DB_DATABASE:-video_generator}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-video123}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      AUTO_CONFIRM: "true"
    command: python scripts/init_db.py
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - video-network
    restart: "no"

networks:
  video-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
